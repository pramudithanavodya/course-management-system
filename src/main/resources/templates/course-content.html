<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Course Content – ABC Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .content-header { background: linear-gradient(135deg, #1a1a2e, #e94560); border-radius: 20px; padding: 3rem; color: white; }
        .content-card { background: white; border-radius: 15px; padding: 2rem; box-shadow: 0 3px 20px rgba(0,0,0,0.08); }
        .topic-item { background: #f8f9fa; border-left: 4px solid #e94560; padding: 12px 20px; margin-bottom: 10px; border-radius: 0 10px 10px 0; }
        .info-badge { background: rgba(255,255,255,0.2); border-radius: 10px; padding: 10px 20px; display: inline-block; }
    </style>
</head>
<body>
<div class="container py-5">
    <a href="/dashboard" class="btn btn-outline-secondary mb-4"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>

    <!-- Course Header -->
    <div class="content-header mb-4">
        <div class="badge bg-white text-dark mb-2" th:text="${course.courseCode}"></div>
        <h2 class="fw-bold" th:text="${course.courseName}"></h2>
        <div class="d-flex gap-3 mt-3 flex-wrap">
            <span class="info-badge"><i class="fas fa-clock me-2"></i><span th:text="${course.lectureHoursPerWeek}"></span> hrs/week</span>
            <span class="info-badge" th:if="${course.lecturer != null}">
                <i class="fas fa-chalkboard-teacher me-2"></i>
                <span th:text="${course.lecturer.lecturerName}"></span>
            </span>
            <span class="info-badge" th:if="${course.department != null}">
                <i class="fas fa-building me-2"></i>
                <span th:text="${course.department.deptName}"></span>
            </span>
        </div>
    </div>

    <div class="row g-4">
        <!-- Course Content -->
        <div class="col-md-8">
            <div class="content-card">
                <h5 class="fw-bold mb-3"><i class="fas fa-list-ul me-2" style="color:#e94560"></i>Course Content</h5>
                <div th:if="${course.courseContent != null}">
                    <div class="topic-item" th:each="topic : ${course.courseContent.split(',')}">
                        <i class="fas fa-check-circle text-success me-2"></i>
                        <span th:text="${topic.trim()}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Course Details Sidebar -->
        <div class="col-md-4">
            <div class="content-card mb-3">
                <h6 class="fw-bold mb-3">Course Details</h6>
                <div class="mb-2"><span class="text-muted">Course Fee:</span>
                    <span class="fw-bold float-end" style="color:#e94560">LKR <span th:text="${course.courseFee}"></span></span>
                </div>
                <div class="mb-2"><span class="text-muted">Hours/Week:</span>
                    <span class="fw-bold float-end" th:text="${course.lectureHoursPerWeek}"></span>
                </div>
                <div class="mb-2" th:if="${course.department != null}">
                    <span class="text-muted">Department:</span>
                    <span class="fw-bold float-end" th:text="${course.department.deptName}"></span>
                </div>
            </div>
            <div class="content-card" style="background:linear-gradient(135deg,#e94560,#c62a47);color:white">
                <i class="fas fa-trophy fa-2x mb-2"></i>
                <h6 class="fw-bold">You're Enrolled! 🎉</h6>
                <p class="small opacity-75 mb-0">Good luck with your studies, <span th:text="${username}"></span>!</p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
