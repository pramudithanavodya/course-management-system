<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; }
        .sidebar { background: #12122b; width: 250px; min-height: 100vh; position: fixed; padding: 2rem 1.5rem; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .nav-link-custom { color: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; text-decoration: none; display: block; }
        .nav-link-custom:hover { background: rgba(233,69,96,0.2); color: #e94560; }
        .table-dark-custom { background: #1e1e3f; border-radius: 15px; overflow: hidden; }
        .table { color: white; }
        .table thead { background: #2d2d5f; }
        .table td, .table th { border-color: #2d2d5f; padding: 12px 15px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="fw-bold fs-5 mb-4" style="color:#e94560">⚙️ Admin Panel</div>
    <a href="/admin/dashboard" class="nav-link-custom"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a href="/admin/courses" class="nav-link-custom"><i class="fas fa-book me-2"></i>Courses</a>
    <a href="/admin/lectures" class="nav-link-custom"><i class="fas fa-chalkboard-teacher me-2"></i>Lecturers</a>
    <a href="/admin/departments" class="nav-link-custom"><i class="fas fa-building me-2"></i>Departments</a>
    <a href="/admin/students" class="nav-link-custom" style="background:rgba(233,69,96,0.2);color:#e94560"><i class="fas fa-users me-2"></i>Students</a>
    <hr style="border-color:#333">
    <a href="/logout" class="nav-link-custom text-danger"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-4">Registered Students <span class="badge bg-danger" th:text="${students.size()}"></span></h4>
    <div class="alert alert-info">
        <i class="fas fa-info-circle me-2"></i>
        Student data is stored in <code>data/students.txt</code> using file I/O operations.
    </div>
    <div class="table-dark-custom">
        <table class="table mb-0">
            <thead>
            <tr>
                <th>#</th>
                <th>Full Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student, stat : ${students}">
                <td th:text="${stat.count}"></td>
                <td th:text="${student.fullName}"></td>
                <td><code class="text-warning" th:text="${student.username}"></code></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.phone}"></td>
            </tr>
            <tr th:if="${students.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-4">No students registered yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
