<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Course – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; }
        .form-card { background: #1e1e3f; border-radius: 20px; padding: 2rem; border: 1px solid #2d2d5f; max-width: 700px; margin: 3rem auto; }
        .form-control, .form-select { background: #2d2d5f; border: 2px solid #3d3d7f; color: white; border-radius: 10px; padding: 11px; }
        .form-control:focus, .form-select:focus { border-color: #e94560; background: #2d2d5f; color: white; box-shadow: none; }
        .form-label { color: #a0b0d0; }
        .form-select option { background: #2d2d5f; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h5 class="fw-bold mb-4"><i class="fas fa-plus-circle me-2" style="color:#e94560"></i>Add New Course</h5>
        <form method="post" th:action="@{/admin/courses/add}">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Course Name *</label>
                    <input type="text" class="form-control" name="courseName" placeholder="e.g. Introduction to Java" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Course Code *</label>
                    <input type="text" class="form-control" name="courseCode" placeholder="e.g. CS101" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Course Content (comma-separated topics)</label>
                    <textarea class="form-control" name="courseContent" rows="3"
                              placeholder="OOP Concepts, Collections, Exception Handling, File I/O"></textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Lecture Hours/Week *</label>
                    <input type="number" class="form-control" name="lectureHoursPerWeek" min="1" max="20" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Course Fee (LKR) *</label>
                    <input type="number" class="form-control" name="courseFee" step="0.01" placeholder="25000.00" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Enrollment Key *</label>
                    <input type="text" class="form-control" name="enrollmentKey" placeholder="e.g. JAVA2024" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <select class="form-select" name="departmentId" required>
                        <option value="">-- Select Department --</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.deptName}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Lecturer</label>
                    <select class="form-select" name="lecturerId">
                        <option value="">-- Select Lecturer --</option>
                        <option th:each="lec : ${lecturers}" th:value="${lec.id}" th:text="${lec.lecturerName}"></option>
                    </select>
                </div>
                <div class="col-12 d-flex gap-3 mt-2">
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="fas fa-save me-2"></i>Save Course
                    </button>
                    <a href="/admin/courses" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
