<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lecturers – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; }
        .sidebar { background: #12122b; width: 250px; min-height: 100vh; position: fixed; padding: 2rem 1.5rem; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .nav-link-custom { color: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; text-decoration: none; display: block; }
        .nav-link-custom:hover { background: rgba(233,69,96,0.2); color: #e94560; }
        .lecturer-card { background: #1e1e3f; border-radius: 15px; padding: 1.5rem; border: 1px solid #2d2d5f; }
        .avatar { width: 50px; height: 50px; background: linear-gradient(45deg,#e94560,#c62a47); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="fw-bold fs-5 mb-4" style="color:#e94560">⚙️ Admin Panel</div>
    <a href="/admin/dashboard" class="nav-link-custom"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a href="/admin/courses" class="nav-link-custom"><i class="fas fa-book me-2"></i>Courses</a>
    <a href="/admin/lectures" class="nav-link-custom" style="background:rgba(233,69,96,0.2);color:#e94560"><i class="fas fa-chalkboard-teacher me-2"></i>Lecturers</a>
    <a href="/admin/departments" class="nav-link-custom"><i class="fas fa-building me-2"></i>Departments</a>
    <a href="/admin/students" class="nav-link-custom"><i class="fas fa-users me-2"></i>Students</a>
    <hr style="border-color:#333">
    <a href="/logout" class="nav-link-custom text-danger"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">Lecturer Management</h4>
        <a href="/admin/lectures/add" class="btn btn-danger"><i class="fas fa-plus me-2"></i>Add Lecturer</a>
    </div>
    <div class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="lec : ${lecturers}">
            <div class="lecturer-card">
                <div class="d-flex align-items-center mb-3">
                    <div class="avatar me-3" th:text="${lec.lecturerName.substring(0,1)}"></div>
                    <div>
                        <div class="fw-bold" th:text="${lec.lecturerName}"></div>
                        <div class="text-white-50 small" th:text="${lec.department != null ? lec.department.deptName : 'No Dept'}"></div>
                    </div>
                </div>
                <div class="small text-white-50">
                    <div><i class="fas fa-envelope me-2"></i><span th:text="${lec.email}"></span></div>
                    <div class="mt-1"><i class="fas fa-phone me-2"></i><span th:text="${lec.phone}"></span></div>
                </div>
                <a th:href="@{/admin/lectures/delete/{id}(id=${lec.id})}"
                   onclick="return confirm('Delete this lecturer?')"
                   class="btn btn-sm btn-outline-danger mt-3 w-100">
                    <i class="fas fa-trash me-1"></i>Remove
                </a>
            </div>
        </div>
        <div class="col-12 text-center text-muted py-5" th:if="${lecturers.isEmpty()}">
            No lecturers added yet.
        </div>
    </div>
</div>
</body>
</html>
