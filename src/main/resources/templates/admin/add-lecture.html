<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Lecturer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; }
        .form-card { background: #1e1e3f; border-radius: 20px; padding: 2rem; border: 1px solid #2d2d5f; max-width: 600px; margin: 3rem auto; }
        .form-control, .form-select { background: #2d2d5f; border: 2px solid #3d3d7f; color: white; border-radius: 10px; padding: 11px; }
        .form-control:focus, .form-select:focus { border-color: #e94560; background: #2d2d5f; color: white; box-shadow: none; }
        .form-label { color: #a0b0d0; }
        .form-select option { background: #2d2d5f; }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h5 class="fw-bold mb-4"><i class="fas fa-user-plus me-2" style="color:#e94560"></i>Add New Lecturer</h5>
        <form method="post" th:action="@{/admin/lectures/add}">
            <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="lecturerName" placeholder="e.g. Mr. Kamal Perera" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="lecturer@abc.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" placeholder="07X XXX XXXX">
            </div>
            <div class="mb-4">
                <label class="form-label">Department *</label>
                <select class="form-select" name="departmentId" required>
                    <option value="">-- Select Department --</option>
                    <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.deptName}"></option>
                </select>
            </div>
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-danger px-4"><i class="fas fa-save me-2"></i>Save</button>
                <a href="/admin/lectures" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
