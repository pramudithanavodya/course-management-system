<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard – ABC Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; min-height: 100vh; }
        .sidebar { background: #12122b; width: 250px; min-height: 100vh; position: fixed; padding: 2rem 1.5rem; border-right: 1px solid #1e1e3f; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .stat-card { border-radius: 15px; padding: 1.5rem; text-align: center; }
        .nav-link-custom { color: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; text-decoration: none; display: block; transition: all 0.2s; }
        .nav-link-custom:hover { background: rgba(233,69,96,0.2); color: #e94560; }
        .admin-card { background: #1e1e3f; border-radius: 15px; padding: 1.5rem; border: 1px solid #2d2d5f; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="fw-bold fs-5 mb-4" style="color:#e94560">⚙️ Admin Panel</div>
    <div class="text-white-50 small mb-4">Logged in as: <span th:text="${adminName}" class="text-white fw-bold"></span></div>
    <a href="/admin/dashboard" class="nav-link-custom"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a href="/admin/courses" class="nav-link-custom"><i class="fas fa-book me-2"></i>Courses</a>
    <a href="/admin/lectures" class="nav-link-custom"><i class="fas fa-chalkboard-teacher me-2"></i>Lecturers</a>
    <a href="/admin/departments" class="nav-link-custom"><i class="fas fa-building me-2"></i>Departments</a>
    <a href="/admin/students" class="nav-link-custom"><i class="fas fa-users me-2"></i>Students</a>
    <hr style="border-color:#333">
    <a href="/logout" class="nav-link-custom text-danger"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-1">Admin Dashboard</h4>
    <p class="text-white-50 mb-4">ABC Institute Management System</p>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(45deg,#e94560,#c62a47)">
                <i class="fas fa-book fa-2x mb-2 opacity-75"></i>
                <div class="fs-2 fw-bold" th:text="${totalCourses}">0</div>
                <div class="opacity-75">Total Courses</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(45deg,#3498db,#2980b9)">
                <i class="fas fa-users fa-2x mb-2 opacity-75"></i>
                <div class="fs-2 fw-bold" th:text="${totalStudents}">0</div>
                <div class="opacity-75">Students</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(45deg,#2ecc71,#27ae60)">
                <i class="fas fa-building fa-2x mb-2 opacity-75"></i>
                <div class="fs-2 fw-bold" th:text="${totalDepts}">0</div>
                <div class="opacity-75">Departments</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="background:linear-gradient(45deg,#9b59b6,#8e44ad)">
                <i class="fas fa-chalkboard-teacher fa-2x mb-2 opacity-75"></i>
                <div class="fs-2 fw-bold" th:text="${totalLecturers}">0</div>
                <div class="opacity-75">Lecturers</div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="admin-card text-center p-4">
                <i class="fas fa-plus-circle fa-3x mb-3" style="color:#e94560"></i>
                <h6 class="fw-bold">Add New Course</h6>
                <a href="/admin/courses/add" class="btn btn-sm btn-danger mt-2">Go to Courses</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="admin-card text-center p-4">
                <i class="fas fa-user-plus fa-3x mb-3" style="color:#3498db"></i>
                <h6 class="fw-bold">Add Lecturer</h6>
                <a href="/admin/lectures/add" class="btn btn-sm btn-primary mt-2">Add Lecturer</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="admin-card text-center p-4">
                <i class="fas fa-building fa-3x mb-3" style="color:#2ecc71"></i>
                <h6 class="fw-bold">Manage Departments</h6>
                <a href="/admin/departments" class="btn btn-sm btn-success mt-2">Departments</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
