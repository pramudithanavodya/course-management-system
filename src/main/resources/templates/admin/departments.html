<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Departments – Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0d0d1a; color: white; }
        .sidebar { background: #12122b; width: 250px; min-height: 100vh; position: fixed; padding: 2rem 1.5rem; }
        .main-content { margin-left: 250px; padding: 2rem; }
        .nav-link-custom { color: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 10px; margin-bottom: 5px; text-decoration: none; display: block; }
        .nav-link-custom:hover { background: rgba(233,69,96,0.2); color: #e94560; }
        .form-card, .dept-card { background: #1e1e3f; border-radius: 15px; padding: 1.5rem; border: 1px solid #2d2d5f; }
        .form-control { background: #2d2d5f; border: 2px solid #3d3d7f; color: white; border-radius: 10px; padding: 10px; }
        .form-control:focus { border-color: #e94560; background: #2d2d5f; color: white; box-shadow: none; }
        .form-label { color: #a0b0d0; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="fw-bold fs-5 mb-4" style="color:#e94560">⚙️ Admin Panel</div>
    <a href="/admin/dashboard" class="nav-link-custom"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a href="/admin/courses" class="nav-link-custom"><i class="fas fa-book me-2"></i>Courses</a>
    <a href="/admin/lectures" class="nav-link-custom"><i class="fas fa-chalkboard-teacher me-2"></i>Lecturers</a>
    <a href="/admin/departments" class="nav-link-custom" style="background:rgba(233,69,96,0.2);color:#e94560"><i class="fas fa-building me-2"></i>Departments</a>
    <a href="/admin/students" class="nav-link-custom"><i class="fas fa-users me-2"></i>Students</a>
    <hr style="border-color:#333">
    <a href="/logout" class="nav-link-custom text-danger"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<div class="main-content">
    <h4 class="fw-bold mb-4">Department Management</h4>
    <div class="row g-4">
        <!-- Add Form -->
        <div class="col-md-5">
            <div class="form-card">
                <h6 class="fw-bold mb-3"><i class="fas fa-plus me-2" style="color:#e94560"></i>Add Department</h6>
                <form method="post" th:action="@{/admin/departments/add}">
                    <div class="mb-2">
                        <label class="form-label small">Department Name *</label>
                        <input type="text" class="form-control" name="deptName" placeholder="e.g. Computer Science" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Department Code *</label>
                        <input type="text" class="form-control" name="deptCode" placeholder="e.g. CS" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Description</label>
                        <input type="text" class="form-control" name="description" placeholder="Brief description">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Head of Department</label>
                        <input type="text" class="form-control" name="headOfDept" placeholder="e.g. Dr. Perera">
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Add Department</button>
                </form>
            </div>
        </div>
        <!-- List -->
        <div class="col-md-7">
            <div class="dept-card" th:each="dept : ${departments}">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="fw-bold" th:text="${dept.deptName}"></div>
                        <div class="text-white-50 small">
                            Code: <span th:text="${dept.deptCode}"></span> |
                            Head: <span th:text="${dept.headOfDept}"></span>
                        </div>
                        <div class="text-white-50 small" th:text="${dept.description}"></div>
                    </div>
                    <a th:href="@{/admin/departments/delete/{id}(id=${dept.id})}"
                       onclick="return confirm('Delete this department?')"
                       class="btn btn-sm btn-outline-danger">
                        <i class="fas fa-trash"></i>
                    </a>
                </div>
            </div>
            <div class="text-center text-muted py-4" th:if="${departments.isEmpty()}">No departments yet.</div>
        </div>
    </div>
</div>
</body>
</html>
