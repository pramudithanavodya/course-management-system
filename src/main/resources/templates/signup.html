<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – ABC Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; display: flex; align-items: center; padding: 2rem 0; }
        .auth-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 3rem; }
        .form-control { border-radius: 10px; padding: 11px 15px; border: 2px solid #e9ecef; }
        .form-control:focus { border-color: #e94560; box-shadow: none; }
        .btn-signup { background: linear-gradient(45deg, #e94560, #c62a47); border: none; padding: 13px; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="text-center mb-4">
                <h2 class="text-white fw-bold">🎓 ABC Institute</h2>
                <p class="text-white-50">Create your student account</p>
            </div>
            <div class="auth-card">
                <h5 class="fw-bold mb-4">Create Account</h5>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form method="post" th:action="@{/signup}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" name="fullName" placeholder="e.g. Kamal Perera" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" class="form-control" name="phone" placeholder="07X XXX XXXX" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Min 6 characters" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" class="form-control" name="confirmPassword" placeholder="Repeat password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-signup text-white w-100 mt-2">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                <div class="text-center mt-3">
                    Already have an account? <a href="/login" class="fw-bold text-decoration-none" style="color:#e94560">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
