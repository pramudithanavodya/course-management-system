<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up – ABC Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: { crimson: '#e94560', navy: '#0f3460', mid: '#1a1a2e', deep: '#0d0b1a' },
              fontFamily: { display: ['Syne','sans-serif'], body: ['DM Sans','sans-serif'] },
            },
          },
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: #0d0b1a; color: #fff; }

        /* ── Floating orbs ──────────────────── */
        @keyframes floatUp {
          0%   { transform: translateY(110vh) scale(0.4); opacity: 0; }
          8%   { opacity: 0.5; }
          92%  { opacity: 0.2; }
          100% { transform: translateY(-8vh) scale(1.1); opacity: 0; }
        }
        .orb {
          position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
          animation: floatUp linear infinite;
          background: radial-gradient(circle at 40% 40%, rgba(233,69,96,0.35), transparent 70%);
        }

        /* ── Glass card ─────────────────────── */
        .glass {
          background: rgba(255,255,255,0.04);
          backdrop-filter: blur(24px);
          border: 1px solid rgba(255,255,255,0.08);
        }

        /* ── Input ──────────────────────────── */
        .field-input {
          width: 100%;
          background: rgba(255,255,255,0.05);
          border: 1.5px solid rgba(255,255,255,0.1);
          border-radius: 12px;
          color: #fff;
          font-family: 'DM Sans', sans-serif;
          font-size: .875rem;
          padding: 11px 14px;
          outline: none;
          transition: border-color .25s, box-shadow .25s, background .25s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.2); }
        .field-input:focus {
          border-color: rgba(233,69,96,0.55);
          background: rgba(255,255,255,0.07);
          box-shadow: 0 0 0 4px rgba(233,69,96,0.08), 0 0 20px rgba(233,69,96,0.1);
        }

        /* ── Label ──────────────────────────── */
        .field-label {
          display: block;
          font-size: .75rem;
          font-weight: 600;
          font-family: 'Syne', sans-serif;
          color: rgba(255,255,255,0.45);
          letter-spacing: .05em;
          margin-bottom: 6px;
          text-transform: uppercase;
        }

        /* ── Submit button ───────────────────── */
        .btn-submit {
          width: 100%;
          background: linear-gradient(135deg, #e94560, #c62a47);
          color: #fff; border: none; border-radius: 12px;
          padding: 13px; font-size: .95rem; font-weight: 700;
          font-family: 'Syne', sans-serif;
          cursor: pointer; letter-spacing: .02em;
          transition: transform .2s, box-shadow .2s;
          position: relative; overflow: hidden;
        }
        .btn-submit::after {
          content: '';
          position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
          opacity: 0; transition: opacity .2s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(233,69,96,0.45); }
        .btn-submit:hover::after { opacity: 1; }
        .btn-submit:active { transform: translateY(0); }

        /* ── Alerts ─────────────────────────── */
        .alert-err {
          background: rgba(233,69,96,0.08); border: 1px solid rgba(233,69,96,0.25);
          border-radius: 11px; padding: 12px 15px;
          color: rgba(255,255,255,0.7); font-size: .82rem;
        }
        .alert-ok {
          background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.25);
          border-radius: 11px; padding: 12px 15px;
          color: rgba(255,255,255,0.7); font-size: .82rem;
        }

        /* ── Divider ────────────────────────── */
        .divider {
          display: flex; align-items: center; gap: 12px;
          color: rgba(255,255,255,0.15); font-size: .75rem;
          margin: 4px 0;
        }
        .divider::before, .divider::after {
          content: ''; flex: 1;
          height: 1px; background: rgba(255,255,255,0.08);
        }

        /* ── Staggered fade-in ───────────────── */
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(26px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeInUp .6s ease both; }
        .d1{animation-delay:.05s;} .d2{animation-delay:.12s;} .d3{animation-delay:.2s;}
        .d4{animation-delay:.28s;} .d5{animation-delay:.36s;} .d6{animation-delay:.44s;}
        .d7{animation-delay:.52s;} .d8{animation-delay:.60s;}

        /* ── Logo shimmer ────────────────────── */
        @keyframes shimmerText {
          0%   { background-position: -200% center; }
          100% { background-position:  200% center; }
        }
        .logo-shimmer {
          background: linear-gradient(90deg, #e94560 0%, #ff8fa3 40%, #e94560 60%, #c62a47 100%);
          background-size: 200% auto;
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: shimmerText 3s linear infinite;
        }

        /* ── Input icon wrapper ──────────────── */
        .input-wrap { position: relative; }
        .input-wrap .ico {
          position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
          color: rgba(255,255,255,0.2); font-size: .8rem; pointer-events: none;
          transition: color .25s;
        }
        .input-wrap .field-input { padding-left: 36px; }
        .input-wrap .field-input:focus + .ico,
        .input-wrap:focus-within .ico { color: rgba(233,69,96,0.7); }

        /* ── Scrollbar ───────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(233,69,96,0.3); border-radius: 99px; }

        /* ── Ring decoration ─────────────────── */
        @keyframes spinSlow { to { transform: rotate(360deg); } }
        .ring-spin { animation: spinSlow 18s linear infinite; }
    </style>
</head>
<body>

<!-- ══ Floating Orbs ══════════════════════════════════════════ -->
<div class="orb" style="width:13px;height:13px;left:5%;animation-duration:17s;animation-delay:0s;"></div>
<div class="orb" style="width:7px;height:7px;left:14%;animation-duration:23s;animation-delay:4s;opacity:.6"></div>
<div class="orb" style="width:10px;height:10px;left:26%;animation-duration:13s;animation-delay:7s;"></div>
<div class="orb" style="width:5px;height:5px;left:39%;animation-duration:20s;animation-delay:2s;opacity:.5"></div>
<div class="orb" style="width:15px;height:15px;left:52%;animation-duration:10s;animation-delay:5s;"></div>
<div class="orb" style="width:9px;height:9px;left:63%;animation-duration:18s;animation-delay:9s;"></div>
<div class="orb" style="width:6px;height:6px;left:75%;animation-duration:14s;animation-delay:1s;opacity:.5"></div>
<div class="orb" style="width:12px;height:12px;left:86%;animation-duration:21s;animation-delay:6s;"></div>
<div class="orb" style="width:8px;height:8px;left:93%;animation-duration:16s;animation-delay:3s;"></div>
<div class="orb" style="width:11px;height:11px;left:45%;animation-duration:25s;animation-delay:11s;opacity:.4"></div>
<div class="orb" style="width:6px;height:6px;left:20%;animation-duration:19s;animation-delay:13s;opacity:.5"></div>
<div class="orb" style="width:9px;height:9px;left:79%;animation-duration:12s;animation-delay:8s;"></div>

<!-- ══ Page ══════════════════════════════════════════════════ -->
<div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-14">

    <!-- ── Logo ──────────────────────────────────────────────── -->
    <div class="text-center mb-7 anim d1 relative">
        <!-- Decorative spinning ring behind logo -->
        <div class="ring-spin absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full pointer-events-none"
             style="border:1px dashed rgba(233,69,96,0.18)"></div>

        <p class="font-display font-extrabold text-3xl tracking-tight leading-none relative z-10">
            🎓 ABC <span class="logo-shimmer">Institute</span>
        </p>
        <p class="text-white/30 text-sm mt-2 font-body">Create your student account</p>
    </div>

    <!-- ── Card ──────────────────────────────────────────────── -->
    <div class="glass rounded-3xl w-full max-w-lg overflow-hidden anim d2">

        <!-- Card header strip -->
        <div class="px-8 pt-8 pb-5 border-b" style="border-color:rgba(255,255,255,0.06)">
            <h1 class="font-display font-extrabold text-xl text-white tracking-tight">Create Account</h1>
            <p class="text-white/30 text-xs mt-1">Fill in your details to get started</p>
        </div>

        <!-- Form body -->
        <div class="px-8 py-7">

            <!-- Alerts -->
            <div th:if="${error}" class="alert-err mb-5 anim d2">
                <i class="fas fa-exclamation-circle mr-2" style="color:#e94560"></i>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="alert-ok mb-5 anim d2">
                <i class="fas fa-check-circle mr-2" style="color:#2ecc71"></i>
                <span th:text="${success}"></span>
            </div>

            <form method="post" th:action="@{/signup}" class="flex flex-col gap-4">

                <!-- Full Name -->
                <div class="anim d3">
                    <label class="field-label">Full Name</label>
                    <div class="input-wrap">
                        <input type="text" class="field-input" name="fullName" placeholder="e.g. Kamal Perera" required>
                        <i class="fas fa-user ico"></i>
                    </div>
                </div>

                <!-- Username + Phone -->
                <div class="grid grid-cols-2 gap-3 anim d4">
                    <div>
                        <label class="field-label">Username</label>
                        <div class="input-wrap">
                            <input type="text" class="field-input" name="username" placeholder="Choose a username" required>
                            <i class="fas fa-at ico"></i>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Phone Number</label>
                        <div class="input-wrap">
                            <input type="tel" class="field-input" name="phone" placeholder="07X XXX XXXX" required>
                            <i class="fas fa-phone ico"></i>
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="anim d5">
                    <label class="field-label">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" class="field-input" name="email" placeholder="you@example.com" required>
                        <i class="fas fa-envelope ico"></i>
                    </div>
                </div>

                <!-- Password + Confirm -->
                <div class="grid grid-cols-2 gap-3 anim d6">
                    <div>
                        <label class="field-label">Password</label>
                        <div class="input-wrap">
                            <input type="password" class="field-input" name="password" placeholder="Min 6 characters" required>
                            <i class="fas fa-lock ico"></i>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Confirm Password</label>
                        <div class="input-wrap">
                            <input type="password" class="field-input" name="confirmPassword" placeholder="Repeat password" required>
                            <i class="fas fa-lock ico"></i>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="anim d7 mt-1">
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </div>

            </form>

            <!-- Divider + login link -->
            <div class="divider mt-6 anim d8">already have an account?</div>
            <div class="text-center mt-3 anim d8">
                <a href="/login"
                   class="font-display font-bold text-sm transition-all duration-200"
                   style="color:#e94560; text-decoration:none;"
                   onmouseover="this.style.textShadow='0 0 16px rgba(233,69,96,0.6)'"
                   onmouseout="this.style.textShadow='none'">
                    Sign in to your account <i class="fas fa-arrow-right text-xs ml-1"></i>
                </a>
            </div>

        </div><!-- end form body -->
    </div><!-- end card -->

</div><!-- end page -->

</body>
</html>
