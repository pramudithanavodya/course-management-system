<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login – ABC Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d0d0d, #1a1a2e); min-height: 100vh; display: flex; align-items: center; }
        .admin-card { background: #1e1e2e; border-radius: 20px; padding: 3rem; border: 1px solid #333; }
        .form-control { background: #2d2d3f; border: 2px solid #333; color: white; border-radius: 10px; padding: 12px; }
        .form-control:focus { border-color: #e94560; background: #2d2d3f; color: white; box-shadow: none; }
        .form-label { color: #a0aec0; }
        .btn-admin { background: linear-gradient(45deg, #e94560, #c62a47); border: none; border-radius: 10px; padding: 13px; font-weight: 700; }
        .shield-icon { font-size: 4rem; color: #e94560; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="admin-card text-center">
                <i class="fas fa-shield-alt shield-icon mb-3"></i>
                <h4 class="text-white fw-bold mb-1">Admin Portal</h4>
                <p class="text-muted mb-4">ABC Institute Management System</p>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form method="post" th:action="@{/admin-login}" class="text-start">
                    <div class="mb-3">
                        <label class="form-label">Admin Username</label>
                        <input type="text" class="form-control" name="username" placeholder="admin" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-admin text-white w-100">
                        <i class="fas fa-unlock me-2"></i>Access Admin Panel
                    </button>
                </form>
                <div class="mt-3">
                    <a href="/" class="text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
                </div>
<!--                <div class="mt-3 p-2 rounded" style="background:#2d2d3f">-->
<!--                    <small class="text-muted">Default: <code class="text-warning">admin</code> / <code class="text-warning">admin123</code></small>-->
<!--                </div>-->
            </div>
        </div>
    </div>
</div>
</body>
</html>
