<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login – ABC Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: { crimson: '#e94560', navy: '#0f3460', mid: '#1a1a2e', deep: '#0d0b1a' },
              fontFamily: { display: ['Syne','sans-serif'], body: ['DM Sans','sans-serif'] },
            },
          },
        }
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: #0d0b1a; color: #fff; overflow-x: hidden; }

        /* ══ Floating orbs ═══════════════════════════════════════ */
        @keyframes floatUp {
          0%   { transform: translateY(110vh) scale(0.4); opacity: 0; }
          8%   { opacity: 0.5; }
          92%  { opacity: 0.15; }
          100% { transform: translateY(-8vh) scale(1.2); opacity: 0; }
        }
        .orb {
          position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
          animation: floatUp linear infinite;
          background: radial-gradient(circle at 40% 40%, rgba(233,69,96,0.4), transparent 70%);
        }

        /* ══ Animated grid lines bg ══════════════════════════════ */
        @keyframes gridMove {
          0%   { background-position: 0 0; }
          100% { background-position: 60px 60px; }
        }
        .grid-bg {
          position: fixed; inset: 0; z-index: 0; pointer-events: none;
          background-image:
            linear-gradient(rgba(233,69,96,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(233,69,96,0.04) 1px, transparent 1px);
          background-size: 60px 60px;
          animation: gridMove 6s linear infinite;
        }

        /* ══ Rotating outer rings ════════════════════════════════ */
        @keyframes spinCW  { to { transform: rotate( 360deg); } }
        @keyframes spinCCW { to { transform: rotate(-360deg); } }

        .ring-outer {
          position: absolute; border-radius: 50%; pointer-events: none;
          border: 1px dashed rgba(233,69,96,0.18);
          animation: spinCW 20s linear infinite;
        }
        .ring-inner {
          position: absolute; border-radius: 50%; pointer-events: none;
          border: 1px dashed rgba(58,134,255,0.15);
          animation: spinCCW 14s linear infinite;
        }

        /* ══ Shield pulse ════════════════════════════════════════ */
        @keyframes shieldPulse {
          0%,100% { text-shadow: 0 0 10px rgba(233,69,96,0.4); transform: scale(1);   }
          50%      { text-shadow: 0 0 35px rgba(233,69,96,0.9), 0 0 60px rgba(233,69,96,0.4); transform: scale(1.08); }
        }
        .shield { animation: shieldPulse 2.8s ease-in-out infinite; display: inline-block; }

        /* ══ Shield ring ripple ══════════════════════════════════ */
        @keyframes ripple {
          0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0.6; }
          100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
        }
        .ripple-ring {
          position: absolute; left: 50%; top: 50%;
          width: 80px; height: 80px; border-radius: 50%;
          border: 1.5px solid rgba(233,69,96,0.4);
          animation: ripple 2s ease-out infinite;
          pointer-events: none;
        }
        .ripple-ring:nth-child(2) { animation-delay: .7s; }
        .ripple-ring:nth-child(3) { animation-delay: 1.4s; }

        /* ══ Glass card ══════════════════════════════════════════ */
        @keyframes cardEntrance {
          from { opacity: 0; transform: translateY(40px) scale(0.96); }
          to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }
        .glass-card {
          background: rgba(255,255,255,0.04);
          backdrop-filter: blur(28px);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 28px;
          animation: cardEntrance .7s cubic-bezier(.22,.68,0,1.2) both;
          animation-delay: .2s;
        }

        /* ══ Title gradient ══════════════════════════════════════ */
        @keyframes gradientFlow {
          0%,100% { background-position: 0%   50%; }
          50%      { background-position: 100% 50%; }
        }
        .title-gradient {
          font-family: 'Syne', sans-serif; font-weight: 800;
          font-size: 1.85rem; letter-spacing: -.02em;
          background: linear-gradient(90deg, #fff 0%, #ffb3c1 35%, #e94560 60%, #fff 100%);
          background-size: 200% auto;
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: gradientFlow 3.5s ease infinite;
        }

        /* ══ Scanline sweep ══════════════════════════════════════ */
        @keyframes scanline {
          0%   { top: -4px;   opacity: .7; }
          100% { top: 100%;   opacity: 0;  }
        }
        .scanline {
          position: absolute; left: 0; right: 0; height: 3px; pointer-events: none;
          background: linear-gradient(90deg, transparent, rgba(233,69,96,0.5), transparent);
          animation: scanline 3.5s ease-in-out infinite;
        }

        /* ══ Input fields ════════════════════════════════════════ */
        .field-wrap { position: relative; }
        .field-icon {
          position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
          color: rgba(255,255,255,0.2); font-size: .8rem; pointer-events: none;
          transition: color .3s;
        }
        .field-wrap:focus-within .field-icon { color: #e94560; }

        .field-input {
          width: 100%;
          background: rgba(255,255,255,0.05);
          border: 1.5px solid rgba(255,255,255,0.1);
          border-radius: 12px; color: #fff;
          font-family: 'DM Sans', sans-serif; font-size: .875rem;
          padding: 13px 14px 13px 38px;
          outline: none;
          transition: border-color .3s, box-shadow .3s, background .3s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.18); }
        .field-input:focus {
          border-color: rgba(233,69,96,0.6);
          background: rgba(255,255,255,0.07);
          box-shadow: 0 0 0 4px rgba(233,69,96,0.1), 0 0 24px rgba(233,69,96,0.12);
        }

        /* ══ Field label ═════════════════════════════════════════ */
        .field-label {
          display: block; font-size: .72rem; font-weight: 700;
          font-family: 'Syne', sans-serif;
          color: rgba(255,255,255,0.35); letter-spacing: .07em;
          text-transform: uppercase; margin-bottom: 7px;
        }

        /* ══ Submit button ═══════════════════════════════════════ */
        @keyframes btnShimmer {
          0%   { background-position: -200% center; }
          100% { background-position:  200% center; }
        }
        .btn-submit {
          width: 100%; border: none; border-radius: 13px;
          padding: 14px; cursor: pointer;
          font-family: 'Syne', sans-serif; font-weight: 800;
          font-size: .95rem; letter-spacing: .03em; color: #fff;
          background: linear-gradient(90deg, #c62a47, #e94560, #ff6b84, #e94560, #c62a47);
          background-size: 300% auto;
          animation: btnShimmer 3s linear infinite;
          transition: transform .2s, box-shadow .2s;
          position: relative; overflow: hidden;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(233,69,96,0.55); }
        .btn-submit:active { transform: translateY(0); }
        /* gloss sweep */
        .btn-submit::after {
          content: '';
          position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%);
          opacity: 0; transition: opacity .25s;
        }
        .btn-submit:hover::after { opacity: 1; }

        /* ══ Alert ═══════════════════════════════════════════════ */
        .alert-err {
          background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3);
          border-radius: 12px; padding: 12px 15px;
          color: rgba(255,255,255,0.75); font-size: .82rem;
        }

        /* ══ Back link ════════════════════════════════════════════ */
        .back-link {
          display: inline-flex; align-items: center; gap: 7px;
          color: rgba(255,255,255,0.3); font-size: .8rem; text-decoration: none;
          transition: color .2s, gap .2s;
        }
        .back-link:hover { color: rgba(255,255,255,0.65); gap: 10px; }

        /* ══ Staggered fade-in ═══════════════════════════════════ */
        @keyframes fadeInUp {
          from { opacity: 0; transform: translateY(18px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeInUp .55s ease both; }
        .d1{animation-delay:.3s;} .d2{animation-delay:.4s;} .d3{animation-delay:.5s;}
        .d4{animation-delay:.6s;} .d5{animation-delay:.7s;} .d6{animation-delay:.82s;}

        /* ══ Corner brackets decoration ═════════════════════════ */
        @keyframes bracketGlow {
          0%,100% { opacity: .3; } 50% { opacity: .7; }
        }
        .corner { position: absolute; width: 18px; height: 18px; animation: bracketGlow 2.5s ease infinite; }
        .corner-tl { top: 16px;  left: 16px;  border-top: 2px solid #e94560; border-left: 2px solid #e94560; }
        .corner-tr { top: 16px;  right: 16px; border-top: 2px solid #e94560; border-right: 2px solid #e94560; animation-delay: .6s; }
        .corner-bl { bottom: 16px; left: 16px;  border-bottom: 2px solid #e94560; border-left: 2px solid #e94560; animation-delay: 1.2s; }
        .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid #e94560; border-right: 2px solid #e94560; animation-delay: 1.8s; }

        /* ══ Scrollbar ═══════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(233,69,96,0.3); border-radius: 99px; }
    </style>
</head>
<body>

<!-- ══ Grid background ══════════════════════════════════════ -->
<div class="grid-bg"></div>

<!-- ══ Floating Orbs ════════════════════════════════════════ -->
<div class="orb" style="width:13px;height:13px;left:5%;animation-duration:17s;animation-delay:0s;"></div>
<div class="orb" style="width:7px;height:7px;left:14%;animation-duration:23s;animation-delay:4s;opacity:.6"></div>
<div class="orb" style="width:10px;height:10px;left:26%;animation-duration:13s;animation-delay:7s;"></div>
<div class="orb" style="width:5px;height:5px;left:39%;animation-duration:20s;animation-delay:2s;opacity:.5"></div>
<div class="orb" style="width:15px;height:15px;left:52%;animation-duration:10s;animation-delay:5s;"></div>
<div class="orb" style="width:9px;height:9px;left:63%;animation-duration:18s;animation-delay:9s;"></div>
<div class="orb" style="width:6px;height:6px;left:75%;animation-duration:14s;animation-delay:1s;opacity:.5"></div>
<div class="orb" style="width:12px;height:12px;left:86%;animation-duration:21s;animation-delay:6s;"></div>
<div class="orb" style="width:8px;height:8px;left:93%;animation-duration:16s;animation-delay:3s;"></div>
<div class="orb" style="width:11px;height:11px;left:44%;animation-duration:25s;animation-delay:11s;opacity:.4"></div>

<!-- ══ Page ══════════════════════════════════════════════════ -->
<div class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 py-14">

    <!-- Institute label -->
    <div class="text-center mb-8 anim" style="animation-delay:.1s">
        <p class="font-display font-extrabold text-xl text-white tracking-tight">
            🎓 ABC <span style="color:#e94560">Institute</span>
        </p>
        <p class="text-white/25 text-xs mt-1">Management System</p>
    </div>

    <!-- ── Card ─────────────────────────────────────────────── -->
    <div class="glass-card w-full max-w-md px-8 pt-10 pb-9 relative overflow-hidden">

        <!-- Scanline sweep -->
        <div class="scanline"></div>

        <!-- Corner brackets -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Rotating rings behind shield -->
        <div class="relative flex justify-center mb-7 anim d1">
            <div style="position:relative;width:90px;height:90px">
                <!-- rings -->
                <div class="ring-outer" style="width:90px;height:90px;top:0;left:0;"></div>
                <div class="ring-inner" style="width:68px;height:68px;top:11px;left:11px;"></div>
                <!-- ripple rings -->
                <div class="ripple-ring"></div>
                <div class="ripple-ring"></div>
                <div class="ripple-ring"></div>
                <!-- shield -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-shield-alt shield" style="font-size:2.2rem;color:#e94560"></i>
                </div>
            </div>
        </div>

        <!-- Title -->
        <div class="text-center mb-1 anim d2">
            <h1 class="title-gradient">Admin Portal</h1>
        </div>
        <p class="text-center text-white/30 text-xs mb-7 anim d2 font-body">Restricted access — authorised personnel only</p>

        <!-- Divider -->
        <div class="w-full h-px mb-7" style="background:linear-gradient(90deg,transparent,rgba(233,69,96,0.3),transparent)"></div>

        <!-- Error alert -->
        <div th:if="${error}" class="alert-err mb-5 anim d2">
            <i class="fas fa-exclamation-triangle mr-2" style="color:#e94560"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Form -->
        <form method="post" th:action="@{/admin-login}" class="flex flex-col gap-5">

            <!-- Username -->
            <div class="anim d3">
                <label class="field-label">Admin Username</label>
                <div class="field-wrap">
                    <input type="text" class="field-input" name="username" placeholder="Enter username" autocomplete="off" required>
                    <i class="fas fa-user-shield field-icon"></i>
                </div>
            </div>

            <!-- Password -->
            <div class="anim d4">
                <label class="field-label">Password</label>
                <div class="field-wrap">
                    <input type="password" class="field-input" name="password" placeholder="••••••••" required>
                    <i class="fas fa-lock field-icon"></i>
                </div>
            </div>

            <!-- Submit -->
            <div class="anim d5 mt-1">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-unlock mr-2"></i>Access Admin Panel
                </button>
            </div>

        </form>

        <!-- Back link -->
        <div class="text-center mt-6 anim d6">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left text-xs"></i> Back to Home
            </a>
        </div>

    </div><!-- end card -->

    <!-- Security note -->
    <p class="text-white/15 text-xs mt-6 font-display tracking-widest uppercase anim d6">
        🔒 &nbsp;Secured Connection
    </p>

</div>

</body>
</html>
