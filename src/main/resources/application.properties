# ============================
# ABC Institute - App Config
# ============================

# App name and port
spring.application.name=abc-institute
server.port=8111

# ============================
# MySQL Database Connection
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/abc_institute?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Chathu123@#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Settings
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================
# Thymeleaf Settings
# ============================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================
# File Storage Path
# ============================

# ============================
# Session timeout
# ============================
server.servlet.session.timeout=30m